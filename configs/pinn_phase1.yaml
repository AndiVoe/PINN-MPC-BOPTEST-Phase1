study_id: pinn_phase1_singlezone

data:
  dataset_root: datasets/phase1_singlezone

model:
  hidden_dim: 64
  depth: 3
  dropout: 0.0

training:
  seed: 42
  device: cpu
  batch_size: 256
  epochs: 80
  patience: 12
  early_stopping:
    patience: 10
    min_delta: 0.0001
    min_epochs: 15
  learning_rate: 0.001
  weight_decay: 0.00001
  lambda_physics: 0.01
  rollout_training:
    enabled: true
    horizon_steps: 24
    weight: 1.0
    batch_size: 128
    max_windows_per_episode: 0
  loss_weighting:
    mode: manual
    gradient_balance:
      ema_beta: 0.9
      lambda_min: 1.0e-6
      lambda_max: 1.0e3
      target_ratio: 1.0
    uncertainty:
      init_log_sigma_data: 0.0
      init_log_sigma_physics: 0.0
