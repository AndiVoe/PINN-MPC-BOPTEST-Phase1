study_id: pinn_eu_stage1
data:
  dataset_root: datasets/eu/bestest_hydronic
model:
  hidden_dim: 64
  depth: 3
  dropout: 0.0
training:
  seed: 42
  device: cpu
  batch_size: 256
  epochs: 150
  patience: 20
  learning_rate: 0.001
  weight_decay: 1.0e-05
  lambda_physics: 0.01
  loss_weighting:
    mode: manual
    gradient_balance:
      ema_beta: 0.9
      lambda_min: 1.0e-6
      lambda_max: 1.0e3
      target_ratio: 1.0
    uncertainty:
      init_log_sigma_data: 0.0
      init_log_sigma_physics: 0.0
