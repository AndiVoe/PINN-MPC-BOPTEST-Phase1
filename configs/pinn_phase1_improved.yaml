study_id: pinn_phase1_singlezone_improved

data:
  dataset_root: datasets/phase1_singlezone

model:
  hidden_dim: 64
  depth: 3
  dropout: 0.0

training:
  seed: 42
  device: cpu
  batch_size: 64  # Reduced from 256 for more stable gradients
  epochs: 80  # Reduced from 150 to prevent overfitting
  patience: 20
  learning_rate: 0.001
  weight_decay: 0.0001  # Increased from 1e-5 for stronger regularization
  lambda_physics: 0.1  # Increased from 0.01 for stronger physics constraint
  loss_weighting:
    mode: manual
    gradient_balance:
      ema_beta: 0.9
      lambda_min: 1.0e-6
      lambda_max: 1.0e3
      target_ratio: 1.0
    uncertainty:
      init_log_sigma_data: 0.0
      init_log_sigma_physics: 0.0
