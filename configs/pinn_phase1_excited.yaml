study_id: pinn_phase1_excited

data:
  dataset_root: datasets/phase1_excited

model:
  hidden_dim: 128        # wider than baseline (64) — more capacity for seasonal diversity
  depth: 4               # deeper for better multi-step rollout skill
  dropout: 0.05          # light regularization given larger model

training:
  seed: 42
  device: cpu
  batch_size: 256
  epochs: 150            # more epochs — excited dataset is harder to fit
  patience: 20           # longer patience before early stopping
  early_stopping:
    patience: 20
    min_delta: 0.0001
    min_epochs: 30
  learning_rate: 0.001
  weight_decay: 0.00001
  lambda_physics: 1.0   # Significantly increased to force building-scale physics adherence
                          # justified: excited setpoints give richer physics signal
  rollout_training:
    enabled: true
    horizon_steps: 48    # 12-hour horizon (was 24) — more multi-step pressure
    weight: 2.0          # stronger rollout penalty (was 1.0)
    batch_size: 64       # smaller batch for longer rollout windows
    max_windows_per_episode: 0
  lbfgs_finetune:
    enabled: false        # Disabled to prevent overflow with exponential mapping
    epochs: 10
    lr: 0.1
    max_iter: 50
    history_size: 100
    line_search_fn: strong_wolfe
  loss_weighting:
    mode: manual
    gradient_balance:
      ema_beta: 0.9
      lambda_min: 1.0e-6
      lambda_max: 1.0e3
      target_ratio: 1.0
    uncertainty:
      init_log_sigma_data: 0.0
      init_log_sigma_physics: 0.0
