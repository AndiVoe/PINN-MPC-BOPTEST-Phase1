name: smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate contract
        run: python scripts/validate_contract.py

      - name: Validate dataset files
        run: python scripts/validate_dataset_files.py

      - name: MPC module smoke test
        run: python scripts/smoke_test_mpc.py
